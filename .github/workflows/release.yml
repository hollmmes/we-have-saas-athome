name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Download FFmpeg
        run: |
          # Create ffmpeg directory
          New-Item -ItemType Directory -Force -Path "src-tauri/ffmpeg"
          
          # Download FFmpeg
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          
          # Extract
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-temp"
          
          # Copy binaries
          Copy-Item "ffmpeg-temp/ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe" "src-tauri/ffmpeg/ffmpeg.exe"
          Copy-Item "ffmpeg-temp/ffmpeg-master-latest-win64-gpl/bin/ffprobe.exe" "src-tauri/ffmpeg/ffprobe.exe"
          
          # Cleanup
          Remove-Item "ffmpeg.zip"
          Remove-Item -Recurse "ffmpeg-temp"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'We Have SaaS at Home v__VERSION__'
          releaseBody: 'Yeni versiyon yayınlandı!'
          releaseDraft: false
          prerelease: false
